<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
  
<body>
  <div id="header" class="header">
    <div class="title">aourbanekMDB</div>
    <div class="nav-buttons">
      <button onclick="scrollToTop()">Home</button>
      <button onclick="scrollToSubmit()">Submit a Film</button>
    </div>
  </div>

  <div id="information" class="information">
    <h2>Welcome to aourbanekMDB</h2>
    <p>A CIS 393 Project</p>
    <p>Here, you can add movies to a database in your browser's local storage, including reviews.</p>
    <br/>
    <input type="text" id="search" placeholder="Search movies...">
  </div>

  <div id="movie-grid-container" class="movie-grid-container">
    <!-- Movies inserted here with JS -->
  </div>

  <div id="submit-movie" class="submit-movie">
    <h3>Submit a Movie:</h3>

    <form id="movie-form">
      <p>
        <label for="filmname">Film name:</label>
        <input type="text" id="filmname" required>
      </p>
      <p>
        <label for="filmgenre">Film genre (optional):</label>
        <select id="filmgenre" required>
          <option value="">-- Select Genre --</option>
          <option value="Action">Action</option>
          <option value="Adventure">Adventure</option>
          <option value="Anthology">Anthology</option>
          <option value="Comedy">Comedy</option>
          <option value="Crime">Crime</option>
          <option value="Documentary">Documentary</option>
          <option value="Drama">Drama</option>
          <option value="Fantasy">Fantasy</option>
          <option value="History">History</option>
          <option value="Horror">Horror</option>
          <option value="Musical">Musical</option>
          <option value="Reality">Reality</option>
          <option value="Romance">Romance</option>
          <option value="Sci-Fi">Sci-Fi</option>
          <option value="Sports">Sports</option>
          <option value="Thriller">Thriller</option>
          <option value="Western">Western</option>
        </select>
      </p>
      <p>
        <label for="filmrating">Rating (0-10):</label>
        <input type="number" id="filmrating" min="0" max="10" required>
      </p>

      <input type="submit" value="Submit Film">
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
