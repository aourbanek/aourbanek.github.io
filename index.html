<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
  
<body>
  <div id="header">
    <div class="title">aourbanekMDB</div>
    <div class="nav-buttons">
      <button onclick="window.location.href='#information'">Home (Top of page)</button>
      <button onclick="window.location.href='#submit-movie'">Submit a Film</button>
    </div>
  </div>

  <div id="information">
    <h2>Welcome to aourbanekMDB</h2>
    <p>A CIS 393 Project</p>
    <p>This page will support adding movies to a database and then collecting reviews on added movies.</p>
  </div>

  <div id="movie-grid-container">
    <div id="grid-item-a">Recently Added Movies</div>
    <div>[Movie 1 Info]</div> 
    <div>[Movie 2 Info]</div>
    <div>[Movie 3 Info]</div>
  </div>

  <div id="submit-movie">
  	<h3>Submit a Movie:</h3>
    <form action="https://aourbanek.github.io/" method="POST">
    <p>
      <label for="filmname">Film name:</label>
      <input type="text" name="filmname" id="filmname" required>
    </p>
    <p>
      <label for="filmgenre">Film genre:</label>
      <input type="text" name="filmgenre" id="filmgenre" required>
    </p>
    <p>
      <label for="filmrating">Give the film a first rating out of 10(optional):</label>
      <input type="number" name="filmrating" id="filmrating" min="0" max="10">
    </p>
      
    <input type="submit" value="Submit Film">
    </form>
  </div>
  
</body>
</html>
