<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
  
<body>
  <div id="header" class="header">
    <div class="title">aourbanekMDB</div>
    <div class="nav-buttons">
      <button onclick="scrollToTop()">Home</button>
      <button onclick="scrollToSubmit()">Submit a Film</button>
    </div>
  </div>

  <div id="information" class="information">
    <h2>Welcome to aourbanekMDB</h2>
    <p>A CIS 393 Project</p>
    <p>This page will support adding movies to a database and then collecting reviews on added movies.</p>
  </div>

  <div id="movie-grid-container" class="movie-grid-container">
    <div id="grid-item-a">Recently Added Movies</div>
    <!-- Movies will be inserted here -->
  </div>

  <div id="submit-movie" class="submit-movie">
    <h3>Submit a Movie:</h3>

    <!-- Still temporary while workarounds for a database are figured out -->
    <form id="movie-form">
      <p>
        <label for="filmname">Film name:</label>
        <input type="text" id="filmname" required>
      </p>
      <p>
        <label for="filmgenre">Film genre:</label>
        <input type="text" id="filmgenre" required>
      </p>
      <p>
        <label for="filmrating">Rating (0-10, optional):</label>
        <input type="number" id="filmrating" min="0" max="10">
      </p>

      <input type="submit" value="Submit Film">
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
